<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Capture Document Back</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      width: 100vw;
      min-height: 100vh;
    }

    .card {
      width: 100%;
      min-height: 100vh;
      background: white;
      padding: 12px;
      display: flex;
      flex-direction: column;
    }

    h2 {
      text-align: center;
      font-size: 22px;
      margin: 10px 0 14px;
      color: #111827;
    }

    .video-box {
      width: 100%;
      max-width: 520px;
      height: 55vh;
      margin: 0 auto;
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      border: 2px solid #ddd;
      background: black;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .guide {
      position: absolute;
      left: 6%;
      top: 28%;
      width: 88%;
      height: 44%;
      border: 3px dashed #22c55e;
      border-radius: 12px;
      pointer-events: none;
    }

    canvas {
      width: 100%;
      max-width: 520px;
      height: 150px;
      margin: 14px auto 0;
      display: block;
      border-radius: 14px;
      border: 2px dashed #ccc;
      background: #fafafa;
    }

    .status {
      width: 100%;
      max-width: 520px;
      margin: 12px auto 0;
      padding: 12px;
      border-radius: 12px;
      background: #eef2ff;
      text-align: center;
      font-size: 15px;
      color: #111827;
    }

    .btn {
      width: 100%;
      max-width: 520px;
      margin: 14px auto 0;
      padding: 14px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      cursor: pointer;
      background: #4f46e5;
      color: white;
    }

    .btn.secondary {
      background: #e5e7eb;
      color: #333;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="card">

    <h2>Capture Document Back</h2>

    <div class="video-box">
      <video id="video" autoplay muted playsinline></video>
      <div class="guide"></div>
    </div>

    <canvas id="canvas" style="display:none"></canvas>

    <div id="status" class="status">
      Starting camera...
    </div>

    <button class="btn" onclick="captureDocumentBack()">
      Capture Back
    </button>

    <button class="btn secondary" onclick="resetCapture()">
      Retry
    </button>

  </div>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusText = document.getElementById('status');

    let captured = false;

    async function startCamera() {

      try {

        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });

        video.srcObject = stream;

        await new Promise(resolve => {
          video.onloadedmetadata = () => {
            video.play();
            resolve();
          };
        });

        statusText.innerText =
          "Place document back inside the box";

      } catch (e) {

        console.error(e);

        statusText.innerText =
          "Camera access failed";
      }
    }

    function getKycToken() {
      const params = new URLSearchParams(window.location.search);
      return params.get("token") || sessionStorage.getItem("kyc_token");
    }

    function captureDocumentBack() {

      if (captured) return;

      captured = true;

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const token = getKycToken();
      const ctx = canvas.getContext("2d");

      ctx.drawImage(
        video,
        0,
        0,
        canvas.width,
        canvas.height
      );

      const imageData =
        canvas.toDataURL("image/jpeg", 0.9);

      statusText.innerText =
        "Uploading document back...";

      fetch(`/api/v1/kyc/sessions/${token}/documents/back`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          image: imageData,
        }),
      })
        .then(res => res.json())
        .then(data => {

          console.log(
            'Document back upload success:',
            data
          );

          statusText.innerText =
            "Document back uploaded successfully";

          setTimeout(() => {

          
            if (!token) {
              alert("KYC session expired or invalid");
              window.location.href = "/verify";
            }

            window.location.href = `/review.html?token=${encodeURIComponent(token)}`;

            //window.location.href = '/review.html';
          }, 800);

        })
        .catch(err => {

          console.error(err);

          statusText.innerText =
            "Upload failed";

          captured = false;
        });
    }

    function resetCapture() {

      captured = false;

      const ctx = canvas.getContext("2d");

      ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
      );

      statusText.innerText =
        "Place document back inside the box";
    }

    window.onload = startCamera;
  </script>

</body>

</html>

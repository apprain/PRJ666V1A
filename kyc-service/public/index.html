<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>KYC Verification</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 380px;
      background: white;
      border-radius: 18px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
      color: #111827;
    }

    p {
      color: #4b5563;
      line-height: 1.6;
      font-size: 15px;
      margin-top: 15px;
    }

    .steps {
      margin-top: 20px;
      text-align: left;
      background: #f9fafb;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
    }

    .steps div {
      margin-bottom: 10px;
      font-size: 14px;
      color: #374151;
    }

    .btn {
      width: 100%;
      margin-top: 25px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #4f46e5;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .btn:hover {
      background: #4338ca;
    }

    .note {
      margin-top: 15px;
      font-size: 12px;
      color: #6b7280;
    }
  </style>
</head>

<body>

<div class="card">

  <h1>Identity Verification</h1>

  <p>
    We will verify your live selfie and identity document.
  </p>

  <div class="steps">
    <div>1. Selfie + Liveness Verification</div>
    <div>2. Capture Document Front</div>
    <div>3. Capture Document Back</div>
    <div>4. Review & Verification</div>
  </div>

  <button class="btn" onclick="startVerification()">
    Start Verification
  </button>

  <div class="note">
    Please allow camera access and ensure good lighting.
  </div>

</div>

<script>
  function startVerification() {
    window.location.href = '/selfie.html';
  }
</script>

</body>
</html>

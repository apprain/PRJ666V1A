<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>KYC Verification</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      width: 100vw;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .card {
      width: 100%;
      max-width: 500px;
      background: white;
      border-radius: 24px;
      padding: 30px 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    .logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 18px;
      border-radius: 50%;
      background: #eef2ff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
    }

    h1 {
      text-align: center;
      font-size: 30px;
      color: #111827;
      margin-bottom: 14px;
    }

    .subtitle {
      text-align: center;
      color: #4b5563;
      line-height: 1.6;
      font-size: 16px;
    }

    .steps {
      margin-top: 26px;
      background: #f9fafb;
      border-radius: 18px;
      padding: 20px;
      border: 1px solid #e5e7eb;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid #e5e7eb;
    }

    .step:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .step:first-child {
      padding-top: 0;
    }

    .step-number {
      min-width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #4f46e5;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: bold;
    }

    .step-text {
      color: #111827;
      font-size: 15px;
    }

    .btn {
      width: 100%;
      margin-top: 28px;
      padding: 16px;
      border: none;
      border-radius: 16px;
      background: #4f46e5;
      color: white;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      background: #4338ca;
    }

    .note {
      margin-top: 18px;
      text-align: center;
      font-size: 13px;
      color: #6b7280;
      line-height: 1.5;
    }

    @media (max-width: 480px) {

      .card {
        padding: 24px 18px;
        border-radius: 20px;
      }

      h1 {
        font-size: 26px;
      }

      .subtitle {
        font-size: 15px;
      }

      .step-text {
        font-size: 14px;
      }

      .btn {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="card">

      <h1>Identity Verification</h1>

      <p class="subtitle">
        We will securely verify your identity using live verification.
      </p>

      <div class="steps">

        <div class="step">
          <div class="step-number">1</div>
          <div class="step-text">
            Selfie + Liveness Verification
          </div>
        </div>

        <div class="step">
          <div class="step-number">2</div>
          <div class="step-text">
            Capture Document Front
          </div>
        </div>

        <div class="step">
          <div class="step-number">3</div>
          <div class="step-text">
            Capture Document Back
          </div>
        </div>

        <div class="step">
          <div class="step-number">4</div>
          <div class="step-text">
            Review & Final Verification
          </div>
        </div>

      </div>

      <button class="btn" onclick="startVerification()">
        Start Verification
      </button>

      <div class="note">
        Please allow camera access and ensure proper lighting.
      </div>

    </div>

  </div>

  <script>
    function getKycToken() {
      const parts = window.location.pathname.split("/");
      return parts[parts.length - 1];
    }

    function startVerification() {
      const token = getKycToken();

      if (!token) {
        alert("Invalid KYC session token");
        return;
      }

      sessionStorage.setItem("kyc_token", token);
      //alert(token);
      window.location.href = `/selfie.html?token=${encodeURIComponent(token)}`;
    }
  </script>
</body>
</html>

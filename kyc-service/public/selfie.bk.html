<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>KYC Liveness</title>

  <style>
   * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #f3f4f6;
  width: 100vw;
  min-height: 100vh;
}

.card {
  width: 100%;
  min-height: 100vh;
  background: white;
  padding: 12px;
  display: flex;
  flex-direction: column;
}

h2 {
  text-align: center;
  font-size: 22px;
  margin: 10px 0 14px;
}

.video-box {
  width: 100%;
  max-width: 420px;
  height: 60vh;
  margin: 0 auto;
  border-radius: 18px;
  overflow: hidden;
  border: 2px solid #ddd;
  background: black;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

canvas {

  width: 100%;
  max-width: 420px;
  height: 160px;
  margin: 14px auto 0;
  display: block;
  border-radius: 14px;
  border: 2px dashed #ccc;
  background: #fafafa;
}

.status,#badge {
  width: 100%;
  max-width: 420px;
  margin: 12px auto 0;
  padding: 12px;
  border-radius: 12px;
  background: #eef2ff;
  text-align: center;
}


.btn {
  width: 100%;
  max-width: 420px;
  margin: 14px auto 0;
  padding: 14px;
  border: none;
  border-radius: 14px;
  background: #4f46e5;
  color: white;
  font-size: 16px;
}
  </style>
</head>

<body>

  <div class="card">

    <h2>KYC Liveness Check</h2>

    <div class="video-box">
      <video id="video" autoplay muted playsinline></video>
    </div>

    <canvas id="canvas" style="  display:none;"></canvas>

    <div id="status" class="status">
      Initializing...
    </div>

    <div id="badge" class="badge">
      Verified
    </div>

    <button class="btn" onclick="resetCapture()">
      Retry
    </button>

  </div>

  <script src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusText = document.getElementById('status');
    const badge = document.getElementById('badge');

    const EAR_THRESHOLD = 0.3;

    let blinkFrames = 0;
    let blinkDetected = false;
    let captured = false;

    async function loadModels() {

      await faceapi.nets.tinyFaceDetector.loadFromUri('/models');

      await faceapi.nets.faceLandmark68Net.loadFromUri('/models');

      statusText.innerText = "Models loaded. Starting camera...";
    }

    async function startVideo() {

      try {

        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "user",
            width: { ideal: 720 },
            height: { ideal: 1280 }
          },
          audio: false
        });

        video.srcObject = stream;

        await new Promise(resolve => {
          video.onloadedmetadata = () => {
            video.play();
            resolve();
          };
        });

        statusText.innerText = "Look straight and blink slowly";

      } catch (e) {

        console.error(e);

        statusText.innerText = "Camera access failed";
      }
    }

    function getEyeAspectRatio(eye) {

      const dist = (a, b) =>
        Math.hypot(a.x - b.x, a.y - b.y);

      const A = dist(eye[1], eye[5]);
      const B = dist(eye[2], eye[4]);
      const C = dist(eye[0], eye[3]);

      return (A + B) / (2.0 * C);
    }

    function detectBlink() {

      setInterval(async () => {

        if (video.readyState < 2) return;

        const detection = await faceapi
          .detectSingleFace(
            video,
            new faceapi.TinyFaceDetectorOptions({
              inputSize: 224,
              scoreThreshold: 0.30
            })
          )
          .withFaceLandmarks();

        if (!detection) {

          blinkFrames = 0;

          statusText.innerText = "No face detected";

          return;
        }

        const leftEye = detection.landmarks.getLeftEye();

        const rightEye = detection.landmarks.getRightEye();

        const EAR = (
          getEyeAspectRatio(leftEye) +
          getEyeAspectRatio(rightEye)
        ) / 2;

        statusText.innerText =
          `EAR: ${EAR.toFixed(2)} | Blink Frames: ${blinkFrames}`;

        if (EAR < EAR_THRESHOLD) {

          blinkFrames++;

        } else {

          if (blinkFrames >= 1 && !blinkDetected) {

            blinkDetected = true;

            statusText.innerText =
              "Blink detected. Capturing...";

            capture();

            blinkFrames = 0;
          }
        }

      }, 150);
    }

    
  function getKycToken() {
    const params = new URLSearchParams(window.location.search);
    return params.get("token") || sessionStorage.getItem("kyc_token");
  }


    function capture() {

      const token = getKycToken();
      if (!token) {
        alert("KYC session expired or invalid");
        window.location.href = "/verify";
      }
      
      if (captured) return;

      captured = true;

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      const ctx = canvas.getContext("2d");

      ctx.drawImage(
        video,
        0,
        0,
        canvas.width,
        canvas.height
      );

      const imageData =
        canvas.toDataURL("image/jpeg");

      statusText.innerText =
        "Captured successfully. Uploading...";
      //https://localhost:4000/api/v1/kyc/sessions/token/documents/selfie
      //  fetch('/kyc/upload-liveness-selfie', {
      fetch(`/api/v1/kyc/sessions/${token}/documents/selfie`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          image: imageData,
        }),
      })
        .then(res => res.json())
        .then(data => {

          console.log('Upload success:', data);

          badge.style.display = "inline-block";

          statusText.innerText =
            "Liveness selfie uploaded successfully";

          setTimeout(() => {

            
            //window.location.href = `/document-front.html?token=${encodeURIComponent(token)}`;

          }, 1200);

        })
        .catch(err => {

          console.error(err);

          statusText.innerText =
            "Upload failed";
        });
    }

    function resetCapture() {

      blinkFrames = 0;

      blinkDetected = false;

      captured = false;

      badge.style.display = "none";

      statusText.innerText =
        "Reset done. Blink again.";
    }

    window.onload = async function () {

      await loadModels();

      await startVideo();

      detectBlink();
    };
  </script>

</body>

</html>

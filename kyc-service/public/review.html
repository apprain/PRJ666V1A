<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>KYC Review</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      width: 100vw;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      min-height: 100vh;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: white;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      text-align: center;
      font-size: 28px;
      color: #111827;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      color: #6b7280;
      font-size: 15px;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    h2 {
      font-size: 20px;
      color: #111827;
      margin-bottom: 16px;
    }

    .status-box {
      padding: 14px;
      border-radius: 14px;
      background: #eef2ff;
      margin-top: 12px;
      font-size: 15px;
      color: #111827;
      line-height: 1.4;
    }

    .success {
      background: #dcfce7;
      color: #166534;
    }

    .warning {
      background: #fef3c7;
      color: #92400e;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
    }

    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      cursor: pointer;
      background: #4f46e5;
      color: white;
      margin-top: 22px;
      font-weight: 600;
    }

    .btn:hover {
      background: #4338ca;
    }

    @media (max-width: 480px) {
      .container {
        padding: 12px;
        align-items: stretch;
      }

      .card {
        min-height: calc(100vh - 24px);
        border-radius: 20px;
        padding: 20px 16px;
      }

      h1 {
        font-size: 25px;
      }

      h2 {
        font-size: 18px;
      }

      .status-box {
        font-size: 14px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="card">

      <h1>KYC Review</h1>

      <p>
        Your submitted selfie and document images are ready for verification.
      </p>

      <h2>Verification Checks</h2>

      <div id="faceStatus" class="status-box">
        Waiting for face verification...
      </div>

      <div id="ocrStatus" class="status-box">
        Waiting for OCR extraction...
      </div>

      <div id="livenessStatus" class="status-box">
        Waiting for liveness validation...
      </div>

      <div id="finalStatus" class="status-box warning">
        Verification in progress...
      </div>

      <button class="btn" onclick="startVerification()">
        Start Background Verification
      </button>

    </div>

  </div>

  <script>
    function getKycToken() {
      const params = new URLSearchParams(window.location.search);
      return params.get("token") || sessionStorage.getItem("kyc_token");
    }

    async function startVerification() {
      const token = getKycToken();

      const faceStatus = document.getElementById("faceStatus");
      const ocrStatus = document.getElementById("ocrStatus");
      const livenessStatus = document.getElementById("livenessStatus");
      const finalStatus = document.getElementById("finalStatus");

      if (!token) {
        alert("KYC session expired or invalid");
        window.location.href = "/verify";
        return;
      }

      try {
        finalStatus.className = "status-box warning";
        finalStatus.innerText = "Running verification checks...";

        // 1. Face Match
        faceStatus.className = "status-box warning";
        faceStatus.innerText = "Running face comparison...";

        const faceRes = await fetch(
          `https://localhost:4000/api/v1/kyc/sessions/${token}/face-check-by-token`,
          {
            method: "POST",
          }
        );

        const faceData = await faceRes.json();

        if (!faceData.matched) {
          faceStatus.className = "status-box error";
          faceStatus.innerText =
            faceData.reason || "Face verification failed";

          finalStatus.className = "status-box error";
          finalStatus.innerText =
            "Verification failed. Please retake your selfie or document photo.";

          return;
        }

        faceStatus.className = "status-box success";
        faceStatus.innerText =
          `Face matched successfully. Score: ${Number(faceData.similarity).toFixed(2)}%`;

        // 2. OCR
        ocrStatus.className = "status-box warning";
        ocrStatus.innerText = "Extracting document information...";

        const ocrRes = await fetch(
          `https://localhost:4000/api/v1/kyc/sessions/${token}/ocr-by-token`,
          {
            method: "POST",
          }
        );

        const ocrData = await ocrRes.json();

        if (!ocrData.success) {
          ocrStatus.className = "status-box error";
          ocrStatus.innerText =
            ocrData.reason || "OCR extraction failed";

          finalStatus.className = "status-box error";
          finalStatus.innerText =
            "Verification failed. Please upload a clearer document image.";

          return;
        }

        ocrStatus.className = "status-box success";
        ocrStatus.innerText =
          `OCR completed. Extracted`;

        // 3. Liveness placeholder
        livenessStatus.className = "status-box success";
        livenessStatus.innerText = "Liveness verification passed";

        // 4. Complete KYC
        finalStatus.className = "status-box warning";
        finalStatus.innerText = "Finalizing KYC session...";

        const completeRes = await fetch(
          `https://localhost:4000/api/v1/kyc/sessions/${token}/complete`,
          {
            method: "GET",
          }
        );

        const completeData = await completeRes.json();

        finalStatus.className = "status-box success";
        finalStatus.innerText = "KYC verification completed successfully";

        setTimeout(() => {
          window.location.href = completeData.redirectUrl;
        }, 1000);
      } catch (error) {
        console.error(error);

        finalStatus.className = "status-box error";
        finalStatus.innerText =
          "Verification failed due to a system error. Please try again.";
      }
    }
  </script>

</body>

</html>

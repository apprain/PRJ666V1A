<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Capture Document Front</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      width: 360px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
    }

    h2 {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .video-box {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid #ddd;
      background: #000;
    }

    video {
      width: 100%;
      display: block;
    }

    .guide {
      position: absolute;
      left: 8%;
      top: 25%;
      width: 84%;
      height: 50%;
      border: 3px dashed #22c55e;
      border-radius: 10px;
      box-sizing: border-box;
      pointer-events: none;
    }

    canvas {
      width: 100%;
      margin-top: 10px;
      border-radius: 12px;
      border: 2px dashed #ccc;
      background: #fafafa;
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
      padding: 8px;
      border-radius: 8px;
      background: #eef2ff;
      color: #333;
    }

    .btn {
      margin-top: 12px;
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      background: #4f46e5;
      color: white;
    }

    .btn.secondary {
      background: #e5e7eb;
      color: #333;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Capture Document Front</h2>

  <div class="video-box">
    <video id="video" autoplay muted playsinline></video>
    <div class="guide"></div>
  </div>

  <canvas id="canvas"></canvas>

  <div id="status" class="status">Starting camera...</div>

  <button class="btn" onclick="captureDocumentFront()">Capture Front</button>
  <button class="btn secondary" onclick="resetCapture()">Retry</button>
</div>

<script>
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const statusText = document.getElementById('status');

  let captured = false;

  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: "environment" },
          width: { ideal: 1280 },
          height: { ideal: 720 }
        },
        audio: false
      });

      video.srcObject = stream;

      await new Promise(resolve => {
        video.onloadedmetadata = () => {
          video.play();
          resolve();
        };
      });

      statusText.innerText = "Place document front inside the box";
    } catch (e) {
      console.error(e);
      statusText.innerText = "Camera access failed";
    }
  }

  function captureDocumentFront() {
    if (captured) return;

    captured = true;

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    const imageData = canvas.toDataURL("image/jpeg", 0.9);

    statusText.innerText = "Uploading document front...";

    fetch('/kyc/upload-document-front', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: imageData })
    })
    .then(res => res.json())
    .then(data => {
      console.log('Document front upload success:', data);
      statusText.innerText = "Document front uploaded successfully";
      window.location.href = '/document-back.html';
    })
    .catch(err => {
      console.error(err);
      statusText.innerText = "Upload failed";
      captured = false;
    });
  }

  function resetCapture() {
    captured = false;
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    statusText.innerText = "Place document front inside the box";
  }

  window.onload = startCamera;
</script>

</body>
</html>
